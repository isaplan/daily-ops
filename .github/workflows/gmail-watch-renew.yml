name: Gmail Inbox Watch Renew

# Renews Gmail users.watch (~7-day expiry). Not on a schedule when inbox uses GitHub polling only — run manually if you re-enable Pub/Sub push.
on:
  workflow_dispatch:

jobs:
  renew-gmail-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Nitro API base + renew Gmail watch
        shell: bash
        env:
          CRON_API_BASE_URL: ${{ secrets.CRON_API_BASE_URL }}
          DO_APP_DOMAIN: ${{ secrets.DO_APP_DOMAIN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${CRON_SECRET:-}" ]]; then
            echo "::error::Set GitHub secret CRON_SECRET"
            exit 1
          fi
          if [[ -z "${DO_APP_DOMAIN:-}" && -z "${CRON_API_BASE_URL:-}" ]]; then
            echo "::error::Set DO_APP_DOMAIN and/or CRON_API_BASE_URL"
            exit 1
          fi
          if [[ -n "${CRON_API_BASE_URL:-}" ]]; then
            API_ROOT="${CRON_API_BASE_URL%/}"
          else
            API_ROOT="https://${DO_APP_DOMAIN}"
          fi
          OUT=$(mktemp)
          trap 'rm -f "$OUT"' EXIT
          HTTP=$(curl -sS -o "$OUT" -w "%{http_code}" "${API_ROOT}/api/inbox/watch/renew?secret=${CRON_SECRET}" \
            -H "Accept: application/json" \
            --connect-timeout 30 \
            --max-time 120)
          echo "HTTP $HTTP"
          tr -d '\r' < "$OUT" | tee /dev/stderr
          echo ""
          if [ "$HTTP" != "200" ]; then exit 1; fi
          if grep -q '<!DOCTYPE html' "$OUT"; then
            echo "::error::Watch renew got SPA HTML — set CRON_API_BASE_URL to your DO Web Service (Nitro) URL"
            exit 1
          fi
