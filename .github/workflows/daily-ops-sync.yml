name: Daily Ops - Bork & Eitje Sync & Aggregation

# If Nitro `scheduledTasks` runs `integrations:bork-eitje-daily` on your DO app (see nuxt.config.ts), comment out
# `on.schedule` below to avoid duplicate Bork/Eitje pulls; keep `workflow_dispatch` for manual runs.

# Nitro URLs are path WITHOUT method suffix: POST /api/bork/v2/cron (not cron.post — that falls through to SPA HTML).
# Aggregation runs inside executeBorkJob / executeEitjeJob after raw sync; there is no separate aggregation route.

# GitHub `schedule` disabled — Bork/Eitje runs on the DO Nitro process (nuxt.config → integrations:bork-eitje-daily).
# Previous UTC cron (for reference if re-enabling): 0 6,13,16,18,20,22 * * *
# 08:00 CEST = 06:00 UTC, 15:00 → 13 UTC, etc. In CET (winter) these land one hour earlier locally.
on:
  workflow_dispatch:

jobs:
  sync-and-aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve Nitro API base (must hit Node — not SPA static host)
        shell: bash
        env:
          CRON_API_BASE_URL: ${{ secrets.CRON_API_BASE_URL }}
          DO_APP_DOMAIN: ${{ secrets.DO_APP_DOMAIN }}
        run: |
          set -euo pipefail
          if [[ -z "${DO_APP_DOMAIN:-}" && -z "${CRON_API_BASE_URL:-}" ]]; then
            echo "::error::Set GitHub secret DO_APP_DOMAIN (hostname, no https) and/or CRON_API_BASE_URL (full https URL of the Web Service that runs Nitro)"
            exit 1
          fi
          if [[ -n "${CRON_API_BASE_URL:-}" ]]; then
            R="${CRON_API_BASE_URL%/}"
            echo "API_ROOT=$R" >> "$GITHUB_ENV"
            echo "Cron curls will use API_ROOT=$R (from CRON_API_BASE_URL)"
          else
            echo "API_ROOT=https://${DO_APP_DOMAIN}" >> "$GITHUB_ENV"
            echo "Cron curls will use API_ROOT=https://${DO_APP_DOMAIN} (from DO_APP_DOMAIN — must route /api to Node)"
          fi

      # ========================================
      # BORK SYNC
      # ========================================
      - name: Bork - Fetch new tickets from API
        shell: bash
        env:
          API_ROOT: ${{ env.API_ROOT }}
        run: |
          echo "🔄 Starting Bork sync..."
          set -euo pipefail
          OUT=$(mktemp)
          trap 'rm -f "$OUT"' EXIT
          HTTP=$(curl -sS -o "$OUT" -w "%{http_code}" -X POST "${API_ROOT}/api/bork/v2/cron" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"action":"run-now","jobType":"daily-data"}' \
            --connect-timeout 30 \
            --max-time 900)
          echo "HTTP $HTTP"
          head -c 500 "$OUT" | tr -d '\r' | tee /dev/stderr
          echo ""
          if [ "$HTTP" != "200" ]; then echo "Expected HTTP 200"; exit 1; fi
          if grep -q '<!DOCTYPE html' "$OUT"; then
            echo "::error::Got SPA HTML, not Nitro JSON. Set GitHub secret CRON_API_BASE_URL to your DO Web Service URL (default ingress), or fix routing so ${API_ROOT}/api/* reaches Node."
            exit 1
          fi
          if ! grep -q '"success"' "$OUT"; then
            echo "::warning::Response has no JSON success field — check sync body"
          fi

      - name: Brief pause before Eitje (separate job load)
        run: sleep 30

      # ========================================
      # EITJE SYNC
      # ========================================
      - name: Eitje - Fetch new time registrations from API
        shell: bash
        env:
          API_ROOT: ${{ env.API_ROOT }}
        run: |
          echo "🔄 Starting Eitje sync..."
          set -euo pipefail
          OUT=$(mktemp)
          trap 'rm -f "$OUT"' EXIT
          HTTP=$(curl -sS -o "$OUT" -w "%{http_code}" -X POST "${API_ROOT}/api/eitje/v2/cron" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"action":"run-now","jobType":"daily-data"}' \
            --connect-timeout 30 \
            --max-time 600)
          echo "HTTP $HTTP"
          head -c 500 "$OUT" | tr -d '\r' | tee /dev/stderr
          echo ""
          if [ "$HTTP" != "200" ]; then exit 1; fi
          if grep -q '<!DOCTYPE html' "$OUT"; then
            echo "::error::Got SPA HTML — set CRON_API_BASE_URL to Nitro Web Service URL"
            exit 1
          fi

      - name: ✅ Sync & Aggregation Complete
        run: |
          echo "✅ Bork & Eitje sync + aggregation finished!"
          echo "📈 Dashboard data updated with latest information"
