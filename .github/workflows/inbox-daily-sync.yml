name: Inbox — daily Gmail sync (polling)

# Fetches new mail via Gmail API + ingest + parse. Does NOT depend on users.watch / Pub/Sub.
# Same pipeline as “Sync from Gmail” in the UI. Uses CRON_SECRET (same as Bork/Eitje scheduled jobs).
on:
  schedule:
    # 06:15 UTC daily (~07:15 CET / 08:15 CEST); change if you prefer another window
    - cron: '15 6 * * *'
  workflow_dispatch:

jobs:
  inbox-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Run inbox Gmail sync (production)
        shell: bash
        env:
          CRON_API_BASE_URL: ${{ secrets.CRON_API_BASE_URL }}
          DO_APP_DOMAIN: ${{ secrets.DO_APP_DOMAIN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${CRON_SECRET:-}" ]]; then
            echo "::error::Missing CRON_SECRET in repository secrets"
            exit 1
          fi
          if [[ -z "${DO_APP_DOMAIN:-}" && -z "${CRON_API_BASE_URL:-}" ]]; then
            echo "::error::Set DO_APP_DOMAIN and/or CRON_API_BASE_URL"
            exit 1
          fi
          if [[ -n "${CRON_API_BASE_URL:-}" ]]; then
            API_ROOT="${CRON_API_BASE_URL%/}"
          else
            API_ROOT="https://${DO_APP_DOMAIN}"
          fi
          echo "Inbox sync using API_ROOT=$API_ROOT"
          OUT=$(mktemp)
          trap 'rm -f "$OUT"' EXIT
          HTTP=$(curl -sS -o "$OUT" -w "%{http_code}" "${API_ROOT}/api/inbox/sync-scheduled?secret=${CRON_SECRET}&maxResults=100" \
            -H "Accept: application/json" \
            --connect-timeout 30 \
            --max-time 600)
          echo "HTTP $HTTP"
          head -c 400 "$OUT" | tr -d '\r' | tee /dev/stderr
          echo ""
          if [ "$HTTP" != "200" ]; then exit 1; fi
          if grep -q '<!DOCTYPE html' "$OUT"; then
            echo "::error::Got SPA HTML — set CRON_API_BASE_URL to your DO Web Service (Nitro) URL"
            exit 1
          fi
