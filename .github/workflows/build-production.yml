name: Build Production

# Trigger on pushes to production branch (merges count as pushes)
on:
  push:
    branches:
      - production

jobs:
  build-production:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Install dependencies
        run: npm install

      - name: Run production build script
        run: npm run build:production

      - name: Check git status
        run: git status

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push production build
        run: |
          cd production
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "chore: production build - stripped unused code [skip ci]"
          git branch -M production
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -u origin production --force
        continue-on-error: true

      - name: Print summary
        run: |
          echo "✅ Production build completed"
          echo "📂 Stripped production/ directory pushed to production branch"
          if [ -f production/PRODUCTION_BUILD_REPORT.json ]; then
            echo "📊 Build report:"
            cat production/PRODUCTION_BUILD_REPORT.json | grep -E '"directories"|"files"|"totalSize"'
          fi

