# Validates that the production branch builds cleanly (Nuxt + Nitro).
# DigitalOcean runs: npm run build, then npm start (see package.json "start").
name: Production branch CI

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Nuxt / Nitro)
        run: npm run build

      - name: Confirm start script exists
        run: grep -q '"start"' package.json && grep -q '.output/server/index.mjs' package.json
